name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          cd Frontend
          npm install

      - name: Build App
        run: |
          cd Frontend
          npm run build

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app ./Frontend

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-app
          
      
      - name: Deploy to Kubernetes
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name devops-cluster
          kubectl set image deployment/devops-app devops-app=${{ secrets.DOCKER_USERNAME }}/devops-app
